name: game
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.1
  equatable: ^2.0.8
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  dartz: ^0.10.1
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3
  nearby_connections: ^4.3.0
  encrypt: ^5.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  injectable_generator: ^2.12.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/mafea.jpg
    - assets/mafea1.png
    - assets/imposter.svg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/imposter_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/imposter_icon.png
  min_sdk_android: 21
